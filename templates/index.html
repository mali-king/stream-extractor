<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0a0a0f">
  <title>Stream Extractor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <!-- Animated background blobs -->
  <div class="bg-blobs" aria-hidden="true">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <div class="container">
    <header>
      <div class="logo" aria-hidden="true">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
          <rect width="48" height="48" rx="12" fill="url(#logo-grad)"/>
          <path d="M16 14v20l18-10L16 14z" fill="#fff" fill-opacity="0.95"/>
          <defs>
            <linearGradient id="logo-grad" x1="0" y1="0" x2="48" y2="48">
              <stop stop-color="#7c3aed"/>
              <stop offset="1" stop-color="#2563eb"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <h1 class="title">Stream <span class="title-accent">Extractor</span></h1>
      <p class="subtitle">Extract video streams and scrape photos from any webpage</p>
    </header>

    <!-- Tab Navigation -->
    <nav class="tab-nav" role="tablist">
      <button class="tab-btn active" data-tab="stream-tab" role="tab" aria-selected="true">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="5 3 19 12 5 21 5 3"/>
        </svg>
        Stream Extractor
      </button>
      <button class="tab-btn" data-tab="photo-tab" role="tab" aria-selected="false">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
          <circle cx="8.5" cy="8.5" r="1.5"/>
          <polyline points="21 15 16 10 5 21"/>
        </svg>
        Photo Extractor
      </button>
    </nav>

    <!-- ===== STREAM TAB ===== -->
    <div id="stream-tab" class="tab-content active">
      <div class="extract-card">
        <form id="extract-form" autocomplete="off">
          <div class="input-group">
            <div class="input-wrapper">
              <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
                <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
              </svg>
              <input type="url" id="url-input" placeholder="https://example.com/video-page" required autofocus>
            </div>
            <button type="submit" id="submit-btn">
              <span class="btn-text">Extract Streams</span>
              <span class="btn-loader hidden"><span class="dot"></span><span class="dot"></span><span class="dot"></span></span>
            </button>
          </div>
        </form>
        <div id="loading-status" class="loading-status hidden"></div>
      </div>

      <div id="error" class="error hidden"></div>
      <div id="results" class="results hidden"></div>
    </div>

    <!-- ===== PHOTO TAB ===== -->
    <div id="photo-tab" class="tab-content">
      <div class="extract-card">
        <form id="photo-extract-form" autocomplete="off">
          <div class="input-group">
            <div class="input-wrapper">
              <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
                <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
              </svg>
              <input type="url" id="photo-url-input" placeholder="https://example.com/gallery-page" required>
            </div>
            <button type="submit" id="photo-submit-btn">
              <span class="btn-text">Extract Photos</span>
              <span class="btn-loader hidden"><span class="dot"></span><span class="dot"></span><span class="dot"></span></span>
            </button>
          </div>
        </form>
        <div id="photo-loading-status" class="loading-status hidden"></div>
      </div>

      <div id="photo-error" class="error hidden"></div>
      <div id="photo-results" class="results hidden"></div>
    </div>
  </div>

  <footer>
    <div class="footer-divider"></div>
    <p class="footer-credit">Developed by Abdirahman Hussein All rights Reserved</p>
  </footer>

  <script src="/static/script.js"></script>
</body>
</html>
